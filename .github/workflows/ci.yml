name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uvx --from build pyproject-build --sdist --wheel
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          path: dist/*
  pytest-linux:
    name: Pytest
    strategy:
      matrix:
        os:
          - "ubuntu-latest"
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
        django-version:
          - "6.0"
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: --entrypoint redis-server
    env:
      REDIS_URL: redis:///0
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv run --with django~=${{ matrix.django-version }}.0 pytest -m "not benchmark"
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  pytest-windows-macos:
    name: Pytest
    permissions:
      contents: read
    strategy:
      matrix:
        os:
          - "windows-latest"
          - "macos-latest"
        python-version:
          - "3.13"
        django-version:
          - "6.0"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - run: uv run --with django~=${{ matrix.django-version }}.0 pytest -m "not benchmark"
